<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="container">
        <h1>Student Management System</h1>
        <div class="actions">
            <a href="create-student.html" class="btn btn-primary">Create New Student</a>
        </div>
        
        <div id="loading" class="loading">Loading students...</div>
        <div id="error" class="error" style="display: none;"></div>
        
        <div id="students-list" class="students-list"></div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Confirm Delete</h2>
            <p>Are you sure you want to delete this student?</p>
            <p><strong id="studentNameToDelete"></strong></p>
            <div class="modal-actions">
                <button id="confirmDeleteBtn" class="btn btn-danger">Delete</button>
                <button id="cancelDeleteBtn" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script src="students.js"></script>
</body>
</html>
